name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancels previous runs for the same branch when new code is pushed.
# This saves GitHub Actions minutes when you push multiple times quickly.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'          # Caches node_modules between runs — saves 2-4 min per run

      - name: Install dependencies
        run: npm ci             # 'ci' = clean install, always reproducible

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build check
        run: npm run build
